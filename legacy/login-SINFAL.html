<!DOCTYPE html>
<!--
  OBSOLETO: la app oficial es React + Vite. Ver README.md en la raíz del proyecto.
  Este archivo se conserva solo como referencia del diseño original del login.
-->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SINFAL — Acceso (legacy)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <style>
    :root {
      --navy: #001233;
      --grey: #757575;
      --input-bg: #f2f2f2;
      --white: #ffffff;
      --green: #4caf50;
      --page-bg: #f4f4f2;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 32px;
      background: var(--page-bg);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      right: 0;
      width: 55%;
      height: 45%;
      background: radial-gradient(
        ellipse 80% 70% at 100% 0%,
        rgba(180, 220, 230, 0.45) 0%,
        rgba(200, 235, 220, 0.2) 40%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow:
        0 4px 24px rgba(0, 18, 51, 0.08),
        0 1px 3px rgba(0, 18, 51, 0.06);
      padding: 40px 36px 28px;
    }

    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .logo .material-symbols-outlined {
      font-size: 28px;
      color: var(--white);
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .card-subtitle {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: var(--grey);
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 18px;
    }

    .field-label-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--grey);
      text-transform: uppercase;
    }

    .forgot-link {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--navy);
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .input-shell {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--input-bg);
      border-radius: 10px;
      padding: 0 14px;
      height: 48px;
      border: 1px solid transparent;
    }

    .input-shell:focus-within {
      border-color: rgba(0, 18, 51, 0.15);
    }

    .input-shell .material-symbols-outlined {
      font-size: 20px;
      color: var(--grey);
      flex-shrink: 0;
    }

    .input-shell input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--navy);
      outline: none;
      min-width: 0;
    }

    .input-shell input::placeholder {
      color: #9e9e9e;
    }

    .toggle-visibility {
      border: none;
      background: none;
      padding: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--grey);
      border-radius: 6px;
    }

    .toggle-visibility:hover {
      background: rgba(0, 18, 51, 0.06);
      color: var(--navy);
    }

    .toggle-visibility .material-symbols-outlined {
      font-size: 20px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 22px;
      cursor: pointer;
      user-select: none;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: var(--navy);
      cursor: pointer;
    }

    .remember span {
      font-size: 0.85rem;
      color: var(--grey);
    }

    .btn-primary {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 10px;
      background: var(--navy);
      color: var(--white);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0, 18, 51, 0.22);
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .btn-primary:hover {
      box-shadow: 0 6px 20px rgba(0, 18, 51, 0.28);
    }

    .btn-primary:active {
      transform: translateY(1px);
    }

    .btn-primary:focus-visible {
      outline: 2px dotted #1976d2;
      outline-offset: 3px;
    }

    .btn-primary .material-symbols-outlined {
      font-size: 20px;
    }

    .card-disclaimer {
      text-align: center;
      font-size: 0.72rem;
      color: var(--grey);
      line-height: 1.45;
      margin-top: 22px;
      padding: 0 8px;
    }

    .card-icons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-top: 18px;
      padding-top: 4px;
    }

    .card-icons .material-symbols-outlined {
      font-size: 22px;
      color: #bdbdbd;
    }

    .card-icons .badge-mini {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #e8e8e8, #d0d0d0);
      border: 1px solid #ccc;
    }

    .page-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 420px;
      margin-top: 28px;
      padding: 0 4px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.25);
    }

    .status-text,
    .version {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--grey);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header class="card-header">
        <div class="logo" aria-hidden="true">
          <span class="material-symbols-outlined">account_balance</span>
        </div>
        <h1 class="card-title">SINFAL</h1>
        <p class="card-subtitle">Institutional Authority</p>
      </header>

      <form action="#" method="post" autocomplete="on">
        <div class="field">
          <label class="label" for="email">Email de institución</label>
          <div class="input-shell">
            <span class="material-symbols-outlined" aria-hidden="true">mail</span>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="usuario@institucion.gov"
              required
            />
          </div>
        </div>

        <div class="field">
          <div class="field-label-row">
            <label class="label" for="password">Contraseña</label>
            <a class="forgot-link" href="#">¿Olvidó su clave?</a>
          </div>
          <div class="input-shell">
            <span class="material-symbols-outlined" aria-hidden="true">lock</span>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="••••••••"
              required
            />
            <button
              type="button"
              class="toggle-visibility"
              aria-label="Mostrar u ocultar contraseña"
              id="togglePw"
            >
              <span class="material-symbols-outlined" id="pwIcon">visibility</span>
            </button>
          </div>
        </div>

        <label class="remember">
          <input type="checkbox" name="remember" />
          <span>Recordar sesión en este dispositivo</span>
        </label>

        <button type="submit" class="btn-primary">
          Acceder al Portal
          <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
        </button>
      </form>

      <p class="card-disclaimer">Acceso restringido únicamente para personal autorizado.</p>

      <div class="card-icons" aria-hidden="true">
        <span class="material-symbols-outlined">shield</span>
        <div class="badge-mini" title="Marca institucional"></div>
      </div>
    </div>

    <footer class="page-footer">
      <div class="status">
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text">Servidores activos</span>
      </div>
      <span class="version">V4.2.0-STABLE</span>
    </footer>
  </div>

  <script>
    (function () {
      var input = document.getElementById("password");
      var btn = document.getElementById("togglePw");
      var icon = document.getElementById("pwIcon");
      if (!input || !btn || !icon) return;
      btn.addEventListener("click", function () {
        var hidden = input.type === "password";
        input.type = hidden ? "text" : "password";
        icon.textContent = hidden ? "visibility_off" : "visibility";
      });
    })();
  </script>
</body>
</html>
